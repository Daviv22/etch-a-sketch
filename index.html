<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Etch-a-Sketch</h1>
</header>

<main>
    <div class="painel-esquerdo">
        <input type="color" id="colorSelector" value="#db0021">
        <button type="button" id="color-btn">Cor</button>
        <button type="button" id="borracha-btn">Borracha</button>
        <button type="button" id="clear-btn">Limpar</button>
        <span id="sizeNumber">12 x 12</span>
        <input id="sizeInput" type="range" min="1" max="64" value="12">
    </div>

    <div class="painel-direito">
        <div class="tela"></div>
    </div>
</main>
<script src="js/script.js"></script>
</body>
</html>
